name: 🔷 Atualizar Visualização 3D de Contribuições - BeOnSafe

on:
  schedule:
    - cron: "0 4 * * *"  # Executa todos os dias às 4h UTC
  workflow_dispatch:      # Permite execução manual

jobs:
  generate-3d-visualization:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🔄 Checkout do repositório
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install kaleido imageio

      - name: 🔑 Configurar Token do GitHub
        run: |
          echo "GITHUB_TOKEN=${{ secrets.GH_TOKEN }}" >> $GITHUB_ENV
        
      - name: 🧮 Gerar visualização 3D
        run: |
          python run_git3d.py ericvasr

      - name: 📸 Verificar arquivos gerados
        run: |
          ls -la images/

      - name: 💾 Commit e Push das alterações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md images/
          git commit -m "🔷 Atualização da visualização 3D de contribuições - BeOnSafe"
          git push
        continue-on-error: true 