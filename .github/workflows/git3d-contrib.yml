name: 🔷 Atualizar Visualização 3D Premium de Contribuições - BeOnSafe

on:
  schedule:
    - cron: "0 3 * * *"  # Executa todos os dias às 3h UTC (otimizado para menor carga)
  workflow_dispatch:      # Permite execução manual

# Configuração de permissões - importante para segurança
permissions:
  contents: write        # Para fazer commit e push
  actions: read          # Para ler o status das ações
  packages: read         # Para ler pacotes

jobs:
  generate-3d-visualization:
    name: Gerar Visualização 3D Premium
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Limite de tempo para evitar execuções travadas
    
    steps:
      - name: 🔄 Checkout do repositório
        uses: actions/checkout@v4  # Versão mais recente
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5  # Versão mais recente
        with:
          python-version: '3.11'  # Versão mais recente e estável
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: 📦 Verificar cache de dependências
        id: pip-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt
          pip install kaleido imageio tqdm colorama matplotlib plotly python-dotenv
        
      - name: 📁 Criar diretórios necessários
        run: |
          mkdir -p images
          mkdir -p logs
          mkdir -p .cache

      - name: 🔑 Configurar Token do GitHub e variáveis
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # Exportar token para variável de ambiente
          echo "GITHUB_TOKEN=${GH_TOKEN}" >> $GITHUB_ENV
          echo "GH_TOKEN=${GH_TOKEN}" >> $GITHUB_ENV
          echo "PYTHONUNBUFFERED=1" >> $GITHUB_ENV  # Para exibir logs em tempo real
          DATE_NOW=$(date +%Y-%m-%d)
          echo "GENERATE_DATE=${DATE_NOW}" >> $GITHUB_ENV
          echo "USERNAME=ericvasr" >> $GITHUB_ENV
          echo "COMPANY_NAME=BeOnSafe" >> $GITHUB_ENV

      - name: 🔍 Buscar dados de contribuições
        id: fetch-data
        run: |
          echo "📊 Iniciando busca de dados de contribuições..."
          # Certificar-se de que o nome de usuário correto é usado
          sed -i 's/USERNAME = "[^"]*"/USERNAME = "ericvasr"/' fetch_contributions.py
          # Criar arquivo .env temporário para processo local
          echo "GH_TOKEN=${GH_TOKEN}" > .env
          echo "GITHUB_TOKEN=${GH_TOKEN}" >> .env
          echo "USERNAME=ericvasr" >> .env
          echo "COMPANY_NAME=BeOnSafe" >> .env
          echo "GIT3D_CACHE_ENABLED=true" >> .env
          echo "GIT3D_CACHE_DURATION=86400" >> .env
          # Executar script com logs
          python fetch_contributions.py 2>&1 | tee logs/fetch_data.log
          # Verificar se os arquivos esperados foram gerados
          if [ -f "contrib_data.csv" ] && [ -f "github_user_data.json" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: 🎨 Gerar visualização 3D premium
        id: generate-viz
        if: steps.fetch-data.outputs.status == 'success'
        run: |
          echo "🔷 Gerando visualização 3D premium..."
          # Certificar-se de que o nome de usuário correto é usado
          sed -i 's/USERNAME = "[^"]*"/USERNAME = "ericvasr"/' generate_advanced_3d.py
          python generate_advanced_3d.py 2>&1 | tee logs/visualization.log
          # Verificar se as imagens foram geradas
          find images -type f | sort
          if [ -f "images/github_3d_beonsafe.html" ] && [ -f "images/github_3d_beonsafe.gif" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: 📝 Atualizar README
        id: update-readme
        if: steps.generate-viz.outputs.status == 'success'
        run: |
          echo "📄 Atualizando README com visualização 3D premium..."
          # Certificar-se de que o nome de usuário correto é usado
          sed -i 's/USERNAME = "[^"]*"/USERNAME = "ericvasr"/' update_readme.py
          python update_readme.py 2>&1 | tee logs/update_readme.log

      - name: 🔄 Corrigir caminhos no README
        run: |
          # Atualizar caminhos das imagens para URLs absolutas
          sed -i 's|![Painel 3D](images/github_3d_beonsafe.gif)|![Painel 3D](https://raw.githubusercontent.com/ericvasr/ericvasr/main/images/github_3d_beonsafe.gif)|g' README.md
          sed -i 's|\[📊 Versão Interativa\](images/github_3d_beonsafe.html)|\[📊 Versão Interativa\](https://htmlpreview.github.io/?https://github.com/ericvasr/ericvasr/blob/main/images/github_3d_beonsafe.html)|g' README.md
          sed -i 's|\[documentação completa\](./README_GIT3D.md)|\[documentação completa\](https://github.com/ericvasr/ericvasr/blob/main/README_GIT3D.md)|g' README.md

      - name: 📊 Verificar e otimizar arquivos gerados
        run: |
          # Otimizar GIFs e PNGs (opcional)
          if command -v optipng &> /dev/null && [ -f "images/github_3d_beonsafe.png" ]; then
            echo "🔧 Otimizando PNG..."
            optipng -o2 images/github_3d_beonsafe.png
          fi
          
          # Exibir resumo dos arquivos gerados
          echo "📂 Arquivos gerados:"
          du -h images/* | sort -h
          
          # Verificar se há erros nos logs
          if grep -i "error\|exception\|fail" logs/*.log; then
            echo "⚠️ Detectados possíveis erros nos logs (verificação informativa apenas)"
          fi

      - name: 🔒 Limpar arquivos sensíveis
        run: |
          # Remover arquivos .env temporários e outros dados sensíveis
          if [ -f ".env" ]; then
            rm .env
          fi
          
          # Garantir que os arquivos de log não contêm informações sensíveis
          if [ -d "logs" ]; then
            find logs -type f -name "*.log" -exec sed -i 's/ghp_[0-9a-zA-Z]\{36\}/***REDACTED***/g' {} \;
          fi

      - name: 💾 Commit e Push das alterações
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # Configurar Git
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # Adicionar alterações
          git add README.md images/ *.csv *.json || true
          
          # Verificar se há mudanças
          if git status --porcelain | grep -q .; then
            echo "🔄 Alterações detectadas, realizando commit..."
            CURRENT_DATE=$(date +%Y-%m-%d)
            git commit -m "🔷 Atualização Premium de Visualização 3D - BeOnSafe [${CURRENT_DATE}]"
            
            # Push com retry em caso de falha
            MAX_RETRIES=3
            RETRY_COUNT=0
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if git push origin main; then
                echo "✅ Push realizado com sucesso!"
                break
              else
                RETRY_COUNT=$((RETRY_COUNT+1))
                echo "⚠️ Falha no push, tentativa $RETRY_COUNT de $MAX_RETRIES..."
                git pull --rebase origin main
                sleep 5
              fi
            done
            
            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo "❌ Falha ao realizar push após $MAX_RETRIES tentativas"
              exit 1
            fi
          else
            echo "✅ Nenhuma alteração detectada para commit"
          fi

      - name: 📤 Upload de logs como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: git3d-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7 