name: 🔷 Atualizar Visualização 3D Premium de Contribuições - BeOnSafe

on:
  schedule:
    - cron: "0 3 * * *"  # Executa todos os dias às 3h UTC (otimizado para menor carga)
  workflow_dispatch:      # Permite execução manual

jobs:
  generate-3d-visualization:
    name: Gerar Visualização 3D Premium
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Limite de tempo para evitar execuções travadas
    
    steps:
      - name: 🔄 Checkout do repositório
        uses: actions/checkout@v4  # Versão mais recente
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5  # Versão mais recente
        with:
          python-version: '3.11'  # Versão mais recente e estável
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: 📦 Verificar cache de dependências
        id: pip-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt
          pip install kaleido imageio tqdm colorama
        
      - name: 📁 Criar diretórios necessários
        run: |
          mkdir -p images
          mkdir -p logs

      - name: 🔑 Configurar Token do GitHub e variáveis
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "GITHUB_TOKEN=$GH_TOKEN" >> $GITHUB_ENV
          echo "PYTHONUNBUFFERED=1" >> $GITHUB_ENV  # Para exibir logs em tempo real
          echo "GENERATE_DATE=$(date +%Y-%m-%d)" >> $GITHUB_ENV

      - name: 🔍 Buscar dados de contribuições
        id: fetch-data
        run: |
          echo "📊 Iniciando busca de dados de contribuições..."
          python fetch_contributions.py 2>&1 | tee logs/fetch_data.log
          # Verificar se os arquivos esperados foram gerados
          if [ -f "contrib_data.csv" ] && [ -f "github_user_data.json" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: 🎨 Gerar visualização 3D premium
        id: generate-viz
        if: steps.fetch-data.outputs.status == 'success'
        run: |
          echo "🔷 Gerando visualização 3D premium..."
          python generate_advanced_3d.py 2>&1 | tee logs/visualization.log
          # Verificar se as imagens foram geradas
          find images -type f | sort
          if [ -f "images/github_3d_beonsafe.html" ] && [ -f "images/github_3d_beonsafe.gif" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: 📝 Atualizar README
        id: update-readme
        if: steps.generate-viz.outputs.status == 'success'
        run: |
          echo "📄 Atualizando README com visualização 3D premium..."
          python update_readme.py 2>&1 | tee logs/update_readme.log

      - name: 📊 Verificar e otimizar arquivos gerados
        run: |
          # Otimizar GIFs e PNGs (opcional)
          if command -v optipng &> /dev/null && [ -f "images/github_3d_beonsafe.png" ]; then
            echo "🔧 Otimizando PNG..."
            optipng -o2 images/github_3d_beonsafe.png
          fi
          
          # Exibir resumo dos arquivos gerados
          echo "📂 Arquivos gerados:"
          du -h images/* | sort -h
          
          # Verificar se há erros nos logs
          if grep -i "error\|exception\|fail" logs/*.log; then
            echo "⚠️ Detectados possíveis erros nos logs (verificação informativa apenas)"
          fi

      - name: 💾 Commit e Push das alterações
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configurar Git
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # Adicionar alterações
          git add README.md images/ *.csv *.json || true
          
          # Verificar se há mudanças
          if git status --porcelain | grep -q .; then
            echo "🔄 Alterações detectadas, realizando commit..."
            git commit -m "🔷 Atualização Premium de Visualização 3D - BeOnSafe [$GENERATE_DATE]"
            
            # Push com retry em caso de falha
            MAX_RETRIES=3
            RETRY_COUNT=0
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if git push; then
                echo "✅ Push realizado com sucesso!"
                break
              else
                RETRY_COUNT=$((RETRY_COUNT+1))
                echo "⚠️ Falha no push, tentativa $RETRY_COUNT de $MAX_RETRIES..."
                git pull --rebase
                sleep 5
              fi
            done
            
            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo "❌ Falha ao realizar push após $MAX_RETRIES tentativas"
              exit 1
            fi
          else
            echo "✅ Nenhuma alteração detectada para commit"
          fi

      - name: 📤 Upload de logs como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: git3d-logs-${{ env.GENERATE_DATE }}
          path: logs/
          retention-days: 7 