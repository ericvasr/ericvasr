name: 🔷 Atualizar Visualização 3D de Contribuições - BeOnSafe

on:
  schedule:
    - cron: "0 4 * * *"  # Executa todos os dias às 4h UTC
  workflow_dispatch:      # Permite execução manual

jobs:
  generate-3d-visualization:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🔄 Checkout do repositório
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install kaleido imageio

      - name: 🔑 Configurar Token do GitHub e variáveis não-interativas
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # Garantir que o token seja passado corretamente
          echo "GITHUB_TOKEN=$GH_TOKEN" >> $GITHUB_ENV
          # Criar diretório de imagens antecipadamente
          mkdir -p images

      - name: 🔧 Modificar script para modo não-interativo
        run: |
          # Criar um script temporário que não pede entrada interativa
          cat > auto_run.py << 'EOF'
          import os
          import sys
          import subprocess

          # Verificar se o token está disponível
          if not os.getenv("GITHUB_TOKEN"):
              print("❌ Erro: Token do GitHub não encontrado nas variáveis de ambiente")
              sys.exit(1)
              
          # Verificar se o usuário foi fornecido como argumento
          if len(sys.argv) != 2:
              print("❌ Erro: Especifique o nome de usuário como argumento")
              sys.exit(1)
              
          # Modificar os scripts para usar o nome de usuário
          username = sys.argv[1]
          
          for script in ["fetch_contributions.py", "visualize_3d.py", "generate_advanced_3d.py"]:
              with open(script, "r") as f:
                  content = f.read()
              
              content = content.replace('USERNAME = "ericvasr"', f'USERNAME = "{username}"')
              
              with open(script, "w") as f:
                  f.write(content)
          
          # Executar cada script diretamente em sequência
          print("📊 Buscando dados de contribuições...")
          subprocess.run([sys.executable, "fetch_contributions.py"], check=True)
          
          print("🎨 Gerando visualizações 3D...")
          subprocess.run([sys.executable, "generate_advanced_3d.py"], check=True)
          
          print("📝 Atualizando README...")
          subprocess.run([sys.executable, "update_readme.py"], check=True)
          
          print("✅ Processo concluído com sucesso!")
          EOF
          
          # Tornar o script executável
          chmod +x auto_run.py
        
      - name: 🧮 Gerar visualização 3D (modo não-interativo)
        run: |
          python auto_run.py ericvasr

      - name: 📸 Verificar arquivos gerados
        run: |
          # Usar uma condição para evitar falha se o diretório não existir
          if [ -d "images" ]; then
            ls -la images/
            echo "Conteúdo do diretório images:"
            find images -type f | sort
          else
            echo "❌ Diretório 'images/' não foi criado"
            mkdir -p images  # Criar para evitar falha no próximo passo
          fi

      - name: 🔄 Corrigir caminhos no README
        run: |
          # Atualizar caminhos das imagens para URLs absolutas
          sed -i 's|![Painel 3D](images/github_3d_beonsafe.gif)|![Painel 3D](https://raw.githubusercontent.com/ericvasr/ericvasr/main/images/github_3d_beonsafe.gif)|g' README.md
          sed -i 's|\[📊 Versão Interativa\](images/github_3d_beonsafe.html)|\[📊 Versão Interativa\](https://htmlpreview.github.io/?https://github.com/ericvasr/ericvasr/blob/main/images/github_3d_beonsafe.html)|g' README.md
          sed -i 's|\[documentação completa\](./README_GIT3D.md)|\[documentação completa\](https://github.com/ericvasr/ericvasr/blob/main/README_GIT3D.md)|g' README.md
          
          # Exibir o conteúdo do README após as alterações
          echo "Conteúdo atualizado do README.md:"
          grep -A 2 "![Painel 3D]" README.md || true

      - name: 💾 Garantir que todos os arquivos sejam adicionados
        run: |
          # Exibir status do git
          git status
          
          # Adicionar todos os arquivos
          git add README.md || true
          git add images/ || true
          git add *.csv || true
          git add *.html || true
          
          # Verificar se há mudanças para commit
          if git status --porcelain | grep -q .; then
            echo "Mudanças detectadas, preparando commit"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "🔷 Atualização da visualização 3D de contribuições - BeOnSafe [$(date +%Y-%m-%d)]"
            git push
            echo "✅ Commit e push realizados com sucesso!"
          else
            echo "Nenhuma alteração detectada para commit"
          fi
        continue-on-error: true 