name: 🎨 Atualizar Painel 3D do GitHub com BeOnSafe

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🔄 Clonar o repositório
        uses: actions/checkout@v3

      - name: 🧰 Instalar dependências
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake libpng-dev git

      - name: ⬇️ Baixar o gerador 3D
        run: |
          git clone https://github.com/yoshi389111/github-profile-3d-contrib.git
          cd github-profile-3d-contrib
          npm install
          npm run generate -- --username=ericvasr --output=../profile-3d-contrib

      - name: ✅ Commit e Push do resultado
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add profile-3d-contrib
          git commit -m "🔁 Atualização do gráfico 3D - BeOnSafe"
          git push
        continue-on-error: true
